server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transacoes}
    username: ${SPRING_DATASOURCE_USERNAME:transacoes}
    password: ${SPRING_DATASOURCE_PASSWORD:transacoes}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: antifraude
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.antonio0ca.transacoes.model
        spring.json.value.default.type: com.antonio0ca.transacoes.model.TransacaoEvent

app:
  topico: transacoes
  intervalo-ms: 900
  qtd-contas: 40
  antifraude:
    limite-negacao: 50000
    limite-suspeita: 10000
    max-por-janela: 5
    janela-ms: 10000
